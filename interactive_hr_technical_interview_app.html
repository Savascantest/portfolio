<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive HR & Technical Interview App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX parsing (Pinned to stable version) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    
    <!-- Lucide Icons (Vanilla UMD to prevent ESM issues) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        /* Preserve scrollbar hiding */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Polyfill for the specific UI animation classes used in the app */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); } to { transform: scale(1); } }
        @keyframes slideInTop { from { transform: translateY(-0.5rem); } to { transform: translateY(0); } }
        .animate-in { animation-duration: 200ms; animation-fill-mode: both; }
        .fade-in { animation-name: fadeIn; }
        .zoom-in-95 { animation-name: fadeIn, zoomIn; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-in-from-top-2 { animation-name: fadeIn, slideInTop; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Added data-type="module" and data-presets to prevent import errors -->
    <script type="text/babel" data-type="module" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        // --- Icon Wrapper to map lucide-react components to the vanilla CDN ---
        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        icons: window.lucide.icons,
                        nameAttr: 'data-lucide',
                        root: spanRef.current
                    });
                    
                    const svg = spanRef.current.querySelector('svg');
                    if (svg && className) {
                        className.split(' ').forEach(c => c && svg.classList.add(c));
                    }
                }
            }, [name, className]);
            
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        // Icon Mappings
        const User = (props) => <Icon name="user" {...props} />;
        const Star = (props) => <Icon name="star" {...props} />;
        const MessageSquare = (props) => <Icon name="message-square" {...props} />;
        const Target = (props) => <Icon name="target" {...props} />;
        const Shield = (props) => <Icon name="shield" {...props} />;
        const AlertCircle = (props) => <Icon name="alert-circle" {...props} />;
        const PlayCircle = (props) => <Icon name="play-circle" {...props} />;
        const Check = (props) => <Icon name="check" {...props} />;
        const Eye = (props) => <Icon name="eye" {...props} />;
        const EyeOff = (props) => <Icon name="eye-off" {...props} />;
        const HelpCircle = (props) => <Icon name="help-circle" {...props} />;
        const ChevronDown = (props) => <Icon name="chevron-down" {...props} />;
        const ChevronUp = (props) => <Icon name="chevron-up" {...props} />;
        const FlaskConical = (props) => <Icon name="flask-conical" {...props} />;
        const Microscope = (props) => <Icon name="microscope" {...props} />;
        const ShieldAlert = (props) => <Icon name="shield-alert" {...props} />;
        const Wrench = (props) => <Icon name="wrench" {...props} />;
        const ArrowRight = (props) => <Icon name="arrow-right" {...props} />;
        const Building2 = (props) => <Icon name="building-2" {...props} />;
        const Droplets = (props) => <Icon name="droplets" {...props} />;
        const Grid = (props) => <Icon name="grid" {...props} />;
        const Leaf = (props) => <Icon name="leaf" {...props} />;


        // ==========================================
        // ORIGINAL REACT CODE
        // ==========================================
        function App() {
          const [interviewStep, setInterviewStep] = useState(1); // 1: HR, 2: Tech, 3: Company
          const [activeTabHR, setActiveTabHR] = useState('pitch');
          const [activeTabTech, setActiveTabTech] = useState('polymers');
          const [activeTabCompany, setActiveTabCompany] = useState('organik');
          const [showNotes, setShowNotes] = useState(false);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-200">
              {}
              {/* Header */}
              <header className="bg-indigo-700 text-white shadow-md p-6">
                <div className="max-w-6xl mx-auto">
                  
                  {/* Top Navigation: Steps */}
                  <div className="flex flex-nowrap md:flex-row justify-start md:justify-start gap-3 mb-6 border-b border-indigo-600 pb-4 overflow-x-auto hide-scrollbar">
                    <button 
                      onClick={() => setInterviewStep(1)}
                      className={`px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all whitespace-nowrap shrink-0 ${interviewStep === 1 ? 'bg-white text-indigo-700 shadow-md scale-105' : 'bg-indigo-800 text-indigo-200 hover:bg-indigo-600'}`}
                    >
                      <User className="w-4 h-4" /> Step 1: HR
                    </button>
                    <div className="hidden md:flex items-center text-indigo-400 shrink-0"><ArrowRight className="w-5 h-5" /></div>
                    <button 
                      onClick={() => setInterviewStep(2)}
                      className={`px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all whitespace-nowrap shrink-0 ${interviewStep === 2 ? 'bg-white text-indigo-700 shadow-md scale-105' : 'bg-indigo-800 text-indigo-200 hover:bg-indigo-600'}`}
                    >
                      <FlaskConical className="w-4 h-4" /> Step 2: Tech Core
                    </button>
                    <div className="hidden md:flex items-center text-indigo-400 shrink-0"><ArrowRight className="w-5 h-5" /></div>
                    <button 
                      onClick={() => setInterviewStep(3)}
                      className={`px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all whitespace-nowrap shrink-0 ${interviewStep === 3 ? 'bg-white text-indigo-700 shadow-md scale-105' : 'bg-indigo-800 text-indigo-200 hover:bg-indigo-600'}`}
                    >
                      <Building2 className="w-4 h-4" /> Step 3: Companies
                    </button>
                  </div>

                  <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                    <div>
                      <h1 className="text-2xl font-bold flex items-center gap-2">
                        {interviewStep === 1 && 'HR Interview Builder'}
                        {interviewStep === 2 && 'Technical Core Builder'}
                        {interviewStep === 3 && 'Company Mastermind Vault'}
                      </h1>
                      <p className="text-indigo-200 mt-1 text-sm">
                        {interviewStep === 1 && 'Core Frameworks & General Questions'}
                        {interviewStep === 2 && 'Advanced Chemistry & Senior Protocols'}
                        {interviewStep === 3 && 'Targeted Senior Organic Chemistry Scenarios'}
                      </p>
                    </div>
                    
                    {}
                    <div className="flex flex-col items-start lg:items-end gap-3 w-full lg:w-auto">
                      <button
                        onClick={() => setShowNotes(!showNotes)}
                        className="flex items-center gap-2 text-sm bg-indigo-800 hover:bg-indigo-600 px-4 py-2 rounded-full text-indigo-100 transition-colors shadow-sm whitespace-nowrap shrink-0"
                      >
                        {showNotes ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
                        {showNotes ? 'Hide Teacher Notes' : 'Show Teacher Notes'}
                      </button>
                      
                      {/* Sub-Tabs Navigation */}
                      <div className="w-full overflow-x-auto hide-scrollbar pb-2">
                        <div className="flex flex-nowrap gap-2 bg-indigo-800 p-1 rounded-lg w-full min-w-min justify-start lg:justify-end">
                          {interviewStep === 1 && (
                            <>
                              <TabButton active={activeTabHR === 'pitch'} onClick={() => setActiveTabHR('pitch')} icon={<Target className="w-4 h-4"/>}>1. Pitch</TabButton>
                              <TabButton active={activeTabHR === 'strengths'} onClick={() => setActiveTabHR('strengths')} icon={<Star className="w-4 h-4"/>}>2. Strengths</TabButton>
                              <TabButton active={activeTabHR === 'survival'} onClick={() => setActiveTabHR('survival')} icon={<Shield className="w-4 h-4"/>}>3. Survival</TabButton>
                              <TabButton active={activeTabHR === 'general'} onClick={() => setActiveTabHR('general')} icon={<HelpCircle className="w-4 h-4"/>}>4. Gen Qs</TabButton>
                            </>
                          )}
                          {interviewStep === 2 && (
                            <>
                              <TabButton active={activeTabTech === 'polymers'} onClick={() => setActiveTabTech('polymers')} icon={<FlaskConical className="w-4 h-4"/>}>1. Scale-Up</TabButton>
                              <TabButton active={activeTabTech === 'instruments'} onClick={() => setActiveTabTech('instruments')} icon={<Microscope className="w-4 h-4"/>}>2. Methods</TabButton>
                              <TabButton active={activeTabTech === 'safety'} onClick={() => setActiveTabTech('safety')} icon={<ShieldAlert className="w-4 h-4"/>}>3. EHS Audit</TabButton>
                              <TabButton active={activeTabTech === 'troubleshooting'} onClick={() => setActiveTabTech('troubleshooting')} icon={<Wrench className="w-4 h-4"/>}>4. Root Cause</TabButton>
                            </>
                          )}
                          {interviewStep === 3 && (
                            <>
                              <TabButton active={activeTabCompany === 'organik'} onClick={() => setActiveTabCompany('organik')} icon={<FlaskConical className="w-4 h-4"/>}>Organik Kimya</TabButton>
                              <TabButton active={activeTabCompany === 'akkim'} onClick={() => setActiveTabCompany('akkim')} icon={<Droplets className="w-4 h-4"/>}>Akkim Kimya</TabButton>
                              <TabButton active={activeTabCompany === 'vitra'} onClick={() => setActiveTabCompany('vitra')} icon={<Grid className="w-4 h-4"/>}>Eczacıbaşı Vitra</TabButton>
                              <TabButton active={activeTabCompany === 'ashland'} onClick={() => setActiveTabCompany('ashland')} icon={<Leaf className="w-4 h-4"/>}>Ashland</TabButton>
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </header>

              {}
              <main className="max-w-6xl mx-auto p-4 md:p-6 mt-4">
                {/* Step 1 */}
                {interviewStep === 1 && activeTabHR === 'pitch' && <ElevatorPitch showNotes={showNotes} />}
                {interviewStep === 1 && activeTabHR === 'strengths' && <StrengthsWeaknesses showNotes={showNotes} />}
                {interviewStep === 1 && activeTabHR === 'survival' && <SurvivalEnglish showNotes={showNotes} />}
                {interviewStep === 1 && activeTabHR === 'general' && <GeneralQuestions showNotes={showNotes} />}

                {/* Step 2 */}
                {interviewStep === 2 && <TechnicalTab category={activeTabTech} showNotes={showNotes} dataSet={technicalData} />}

                {/* Step 3 */}
                {interviewStep === 3 && <TechnicalTab category={activeTabCompany} showNotes={showNotes} dataSet={companyData} />}
              </main>

              <style dangerouslySetInnerHTML={{__html: `
                .hide-scrollbar::-webkit-scrollbar {
                  display: none;
                }
                .hide-scrollbar {
                  -ms-overflow-style: none;
                  scrollbar-width: none;
                }
              `}} />
            </div>
          );
        }

        function TabButton({ active, onClick, children, icon }) {
          return (
            <button 
              onClick={onClick}
              className={`px-3 py-1.5 rounded-md font-medium text-sm flex items-center gap-1.5 transition-all whitespace-nowrap shrink-0 ${
                active ? 'bg-white text-indigo-700 shadow-sm' : 'text-indigo-100 hover:bg-indigo-600 hover:text-white'
              }`}
            >
              {icon} {children}
            </button>
          );
        }

        // ==========================================
        // DATA: STEP 2 (Core Technical)
        // ==========================================
        const technicalData = {
          polymers: {
            title: "Advanced Polymer Chemistry & Scale-up",
            icon: <FlaskConical className="w-6 h-6 text-teal-500" />,
            colorTheme: "teal",
            teacherNote: "For senior roles, they test the ability to move beyond basic theory into formulation design, scale-up dynamics, and resolving complex emulsion instabilities.",
            questions: [
              { q: "How do you approach scaling up a polymer emulsion formulation from a 1L lab reactor to a 1000L pilot plant?", t: "I focus heavily on heat transfer capabilities and mixing shear dynamics, as surface-area-to-volume ratios change drastically. I also recalculate feed rates and initiator dosing to prevent runaway exotherms." },
              { q: "If a polymer emulsion shows signs of coagulation during storage stability testing, how do you modify the surfactant package?", t: "I would analyze the HLB (Hydrophilic-Lipophilic Balance) values of the current system. I'd likely introduce steric stabilizers alongside electrostatic ones, and check if pH buffering is needed over time." },
              { q: "Explain your strategy for reducing the VOC content in a water-based acrylic without compromising film formation.", t: "I utilize core-shell polymerization techniques or incorporate non-volatile coalescing agents. This allows us to maintain a low Minimum Film Forming Temperature (MFFT) while meeting strict environmental regulations." },
              { q: "How do you tailor cross-linking density to balance tensile strength and elongation in an adhesive?", t: "I adjust the ratio of hard to soft segments in the polymer backbone and carefully control the functionality and concentration of the reactive monomers or prepolymers used in the formulation." }
            ]
          },
          instruments: {
            title: "Method Development & Advanced Analytics",
            icon: <Microscope className="w-6 h-6 text-cyan-500" />,
            colorTheme: "cyan",
            teacherNote: "Seniors aren't just running tests; they are creating them. Focus on method validation (LOD/LOQ), interpreting complex spectra, and predictive rheology.",
            questions: [
              { q: "Describe a time you had to develop and validate a new GC or HPLC method for a complex mixture.", t: "I start by researching the target analytes to select the right stationary phase. Then, I optimize temperature gradients or mobile phases, and perform a full validation for linearity, LOD, and LOQ to ensure reproducibility." },
              { q: "FTIR shows an unexpected peak in a new batch. How do you systematically identify the contaminant?", t: "I cross-reference the peak with our spectral libraries and run a background check. If it's ambiguous, I extract the sample with different solvents and couple it with GC-MS or NMR for absolute structural confirmation." },
              { q: "How do you use advanced rheological profiling to predict the settling behavior of a suspension?", t: "I run amplitude and frequency sweeps to analyze the yield stress and the storage/loss moduli (G' and G'') in the linear viscoelastic region. This tells me if the internal structure is stable enough at rest to prevent settling." },
              { q: "When managing a lab, how do you decide when to troubleshoot an instrument internally versus calling the vendor?", t: "I evaluate the cost of downtime, the complexity of the fault (e.g., column leak vs laser alignment), and my team's diagnostic training. If tinkering risks voiding a warranty or losing a week of R&D, I call the vendor." }
            ]
          },
          safety: {
            title: "Safety Leadership & EHS Compliance",
            icon: <ShieldAlert className="w-6 h-6 text-orange-500" />,
            colorTheme: "orange",
            teacherNote: "Senior staff must lead by example and assess overarching risks. The focus shifts from 'wearing goggles' to conducting HAZOPs, auditing, and mentoring juniors.",
            questions: [
              { q: "How do you conduct a risk assessment for a completely new, potentially exothermic polymerization protocol?", t: "I perform a HAZOP (Hazard and Operability) analysis. I calculate theoretical heat generation, scale down the initial reaction size drastically, and ensure blast shields, proper ventilation, and active cooling fail-safes are in place." },
              { q: "How do you foster a proactive safety culture among junior lab technicians?", t: "I lead by example on the floor and implement a 'near-miss' reporting system without penalties. I also actively involve junior staff in reviewing and updating our Standard Operating Procedures (SOPs)." },
              { q: "Walk me through your process for auditing the lab's chemical inventory for ISO/EHS compliance.", t: "I cross-reference the physical inventory against our digital SDS database. I ensure strict segregation of incompatible chemicals, verify secondary containment integrity, and review the manifest logs for legal waste disposal tracking." },
              { q: "If a junior technician repeatedly violates safety protocols despite warnings, how do you address it?", t: "I pull them aside privately to understand the root cause. I firmly explain the severe risks, document our conversation, and escalate to HR or the Lab Manager if the unsafe behavior continues." }
            ]
          },
          troubleshooting: {
            title: "Root Cause Analysis & Project Triage",
            icon: <Wrench className="w-6 h-6 text-violet-500" />,
            colorTheme: "violet",
            teacherNote: "Seniors handle crises. These questions test their ability to manage production failures, replace toxic legacy materials, and delegate tasks under pressure.",
            questions: [
              { q: "A production batch just failed QC for the first time in two years. Walk me through your Root Cause Analysis.", t: "I immediately quarantine the batch. I use an Ishikawa (Fishbone) diagram to systematically analyze raw materials, equipment logs, process parameters, and personnel changes, comparing retention samples to the failed batch." },
              { q: "Your team is running behind on multiple critical R&D projects. How do you triage and allocate resources?", t: "I prioritize based on commercial impact and hard client deadlines. I delegate routine analytical testing to junior staff, temporarily halt lower-priority exploratory work, and communicate realistic revised timelines to stakeholders." },
              { q: "During a scale-up trial, the product's viscosity suddenly spikes out of control. What is your immediate action?", t: "I immediately halt the monomer feed and apply maximum cooling to prevent gelation or a dangerous runaway reaction. Afterward, I investigate mixing efficiency, localized concentration gradients, or initiator miscalculations." },
              { q: "You are tasked with replacing a banned, toxic raw material in a legacy product without changing its performance. Approach?", t: "I identify the exact chemical function of the banned material. I screen safer alternatives with similar solubility parameters and reactive groups, formulate lab-scale prototypes, and run rigorous accelerated aging tests against the legacy benchmark." }
            ]
          }
        };

        // ==========================================
        // DATA: STEP 3 (Company Specific)
        // ==========================================
        const companyData = {
          organik: {
            title: "Organik Kimya: Polymer Emulsions & Adhesives",
            icon: <FlaskConical className="w-6 h-6 text-emerald-500" />,
            colorTheme: "emerald",
            teacherNote: "Organik Kimya is heavily invested in water-based polymer emulsions and pressure-sensitive adhesives (PSAs). Focus on monomer ratios, film formation, and surfactant stability.",
            questions: [
              { q: "In developing a new water-based pressure-sensitive adhesive (PSA), how do you balance the monomer ratio to optimize both tack and shear strength?", t: "I would adjust the ratio of low Tg monomers, like butyl acrylate, for tack, and high Tg monomers, like methyl methacrylate, for cohesive shear strength, adding a small percentage of a crosslinking monomer like acrylic acid." },
              { q: "How do you troubleshoot the formation of coagulum (grit) during a radical emulsion polymerization process?", t: "Coagulum usually points to instability. I would check the surfactant system's HLB balance, ensure the agitation isn't causing excessive shear, and verify the initiator feed rate to prevent sudden localized exotherms." },
              { q: "What strategies would you use to formulate an APEO-free (alkylphenol ethoxylate-free) polymer emulsion while maintaining the same particle size distribution?", t: "I would transition to fatty alcohol ethoxylates or sulfated derivatives. This requires recalculating the critical micelle concentration (CMC) and often requires blending steric and electrostatic stabilizers to mimic the robust stability APEOs previously provided." },
              { q: "Describe the chemical mechanism of film formation in latex coatings and how you lower the Minimum Film Forming Temperature (MFFT).", t: "Film formation involves water evaporation, particle packing, and polymer chain interdiffusion. To lower MFFT without sacrificing hardness, I use coalescing agents or design a core-shell polymer morphology where the soft shell promotes integration." },
              { q: "When translating a batch synthesis of a new acrylic binder from a 5L lab scale to a 5-ton reactor, what mass transfer issues do you anticipate?", t: "Heat dissipation is the biggest issue. I would alter the dosing strategy from a batch to a semi-continuous monomer feed to strictly control the heat generation rate relative to the plant reactor's cooling jacket capacity." }
            ]
          },
          akkim: {
            title: "Akkim Kimya: Water Treatment & Textile Auxiliaries",
            icon: <Droplets className="w-6 h-6 text-blue-500" />,
            colorTheme: "blue",
            teacherNote: "Akkim focuses on performance chemicals, flocculants, and textile/paper chemicals. The focus here is on charge density, defoamers, and managing hazardous scale-up.",
            questions: [
              { q: "When designing a new polymeric flocculant for industrial wastewater treatment, how do you determine the optimal molecular weight and charge density?", t: "High molecular weight is better for bridging mechanisms, while high charge density is needed for charge neutralization. I would run jar tests measuring turbidity and zeta potential to optimize the acrylamide to cationic monomer ratio." },
              { q: "How do you synthesize a highly stable silicone emulsion for use as a textile softening auxiliary without causing yellowing over time?", t: "I would use an amino-functional silicone fluid but carefully control the amine number. To prevent oxidative yellowing during high-temperature curing, I might incorporate hindered amine light stabilizers (HALS) or use secondary rather than primary amines." },
              { q: "In the production of organic phosphonates for scale inhibition, how do you minimize residual unreacted formaldehyde?", t: "I would precisely control the stoichiometry and reaction temperature during the Mannich-type reaction, and likely implement an extended digestion period or a vacuum stripping step at the end of the synthesis to remove volatile residuals." },
              { q: "You are formulating a new defoamer for the paper industry. How do you balance the spreading coefficient with the risk of causing surface defects?", t: "I would select a carrier oil and hydrophobic silica package with a positive spreading coefficient. To avoid 'fish-eyes', I must ensure the droplet size is optimized via the emulsification process so it is incompatible with foam but compatible with the paper coating." },
              { q: "Walk us through how you would scale up the synthesis of a quaternary ammonium compound (surfactant) safely.", t: "Quaternization (using alkyl halides) is highly exothermic and toxic. I would implement strict temperature controls, use a semi-batch process to control the feed rate of the alkylating agent, and ensure scrubbers are active to handle any vapor release." }
            ]
          },
          vitra: {
            title: "Eczacıbaşı Vitra: Ceramics, Binders & Rheology",
            icon: <Grid className="w-6 h-6 text-stone-500" />,
            colorTheme: "stone",
            teacherNote: "Vitra makes ceramics, but organic chemistry is crucial for the binders, deflocculants, and rheology modifiers that make the manufacturing process possible.",
            questions: [
              { q: "Although we make ceramics, we rely heavily on organic binders. How does the molecular weight of a polymeric binder affect the green strength of a pressed ceramic tile?", t: "Higher molecular weight polymers create stronger entanglement networks, significantly improving the green strength of the unfired tile. However, I must balance this so it doesn't increase slurry viscosity excessively." },
              { q: "Explain the thermal degradation profile of organic deflocculants (like polyacrylates) during the ceramic firing process. Why is this critical?", t: "Deflocculants must decompose completely and cleanly (usually between 300-500°C) before the ceramic pores close. If they leave carbonaceous residue or decompose too violently, it causes 'black core' defects or micro-cracking in the fired piece." },
              { q: "How do you formulate an organic screen-printing medium for ceramic glazes that provides proper pseudo-plastic rheology?", t: "I would use a blend of solvents combined with cellulosic thickeners or acrylic rheology modifiers. The system must exhibit high viscosity at rest to prevent pigment settling, but shear-thin rapidly under the squeegee for clean printing." },
              { q: "If a ceramic slip (suspension) is showing signs of aging and viscosity drift over 48 hours, what organic chemical interactions are likely failing?", t: "Viscosity drift usually means the organic polyanionic deflocculant is degrading due to bacterial attack, or uncoiling differently as ions leach from the clay. I would add biocides or switch to a more sterically bulky, ion-tolerant dispersing agent." },
              { q: "When developing a new organic-inorganic composite material, how do you improve the interfacial adhesion between the organic polymer matrix and the inorganic filler?", t: "I would utilize coupling agents, such as organofunctional silanes. The alkoxy groups of the silane react with the hydroxyl groups on the inorganic surface, while the organofunctional group co-polymerizes or entangles with the organic matrix." }
            ]
          },
          ashland: {
            title: "Ashland: Specialty Additives & Cellulosics",
            icon: <Leaf className="w-6 h-6 text-green-500" />,
            colorTheme: "green",
            teacherNote: "Ashland creates specialty additives, excipients, and personal care chemicals. Focus heavily on cellulosic ethers, rheology profiles, and bio-friendly formulations.",
            questions: [
              { q: "How do you modify the degree of substitution (DS) in cellulose ethers to shift a product from being water-soluble to organic solvent-soluble?", t: "To increase organic solubility, I would increase the degree of substitution with highly hydrophobic groups. For example, moving from a lightly substituted carboxymethyl cellulose to a heavily substituted ethyl cellulose." },
              { q: "In formulating a leave-on hair care product, how do you prevent cationic polymers from building up and causing a stiff, greasy feel?", t: "I would carefully lower the charge density of the polyquaternium ingredient and optimize its molecular weight. Formulating with an anionic surfactant that forms a rinsable coacervate complex upon dilution ensures conditioning without long-term buildup." },
              { q: "Describe the rheological differences between a solution thickened with a traditional cellulosic ether versus an associative thickener (HEUR).", t: "Traditional cellulosics thicken via chain entanglement, leading to highly shear-thinning behavior and poor leveling. HEURs form transient micellar networks, resulting in more Newtonian flow, better spatter resistance, and superior leveling in architectural coatings." },
              { q: "When synthesizing a new bio-based specialty additive, how do you ensure the product maintains long-term microbial stability without relying on harsh traditional preservatives?", t: "I would explore hurdle technology, managing the water activity and pH. Chemically, I might incorporate multifunctional ingredients like caprylyl glycol, which provide humectant properties while also disrupting microbial cell membranes." },
              { q: "You are tasked with developing a new pharmaceutical excipient for controlled release. How do you tailor the polymer swelling kinetics?", t: "Swelling kinetics in hydrogel matrices (like HPMC) are governed by polymer MW, particle size, and the ratio of substituents. By selecting an HPMC grade with a higher viscosity/MW, the gel layer forms faster and erodes slower, extending the drug release profile." }
            ]
          }
        };

        // ==========================================
        // RENDERERS (Step 2 & 3)
        // ==========================================
        function TechnicalTab({ category, showNotes, dataSet }) {
          const data = dataSet[category];
          
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
              <div className="mb-8 border-b border-slate-100 pb-6">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                  {data.icon} {data.title}
                </h2>
                {showNotes && (
                  <p className="text-sm md:text-base text-slate-700 mt-3 bg-yellow-50 p-4 rounded-lg border border-yellow-200 animate-in fade-in">
                    <strong>Teacher's Note:</strong> {data.teacherNote} Click on each question to expand and reveal a suggested technical answer template.
                  </p>
                )}
              </div>

              <div className="space-y-4">
                {data.questions.map((item, idx) => (
                  <QuestionFlipCard key={idx} question={item.q} template={item.t} number={idx + 1} colorTheme={data.colorTheme} />
                ))}
              </div>
            </div>
          );
        }

        // ==========================================
        // STEP 1 COMPONENTS (HR)
        // ==========================================
        function ElevatorPitch({ showNotes }) {
          const [pitch, setPitch] = useState({ past: "", present: "", future: "" });
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
              <div className="mb-8 border-b border-slate-100 pb-6">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2"><MessageSquare className="w-6 h-6 text-indigo-500" /> "Tell me about yourself."</h2>
                {showNotes && <p className="text-sm md:text-base text-slate-700 mt-3 bg-yellow-50 p-4 rounded-lg border border-yellow-200"><strong>Teacher's Note:</strong> Teach the <em>Past-Present-Future</em> rule. Spend exactly 1-2 sentences on each block.</p>}
              </div>
              <div className="flex flex-col md:flex-row gap-6">
                <PitchBlock title="1. The Past" color="blue" value={pitch.past} template="I graduated with a degree in Chemistry and my thesis was about..." onChange={(e) => setPitch({...pitch, past: e.target.value})} />
                <PitchBlock title="2. The Present" color="emerald" value={pitch.present} template="Currently, I am working as a Senior Lab Tech where I focus on..." onChange={(e) => setPitch({...pitch, present: e.target.value})} />
                <PitchBlock title="3. The Future" color="purple" value={pitch.future} template="I applied because of your innovative work with..." onChange={(e) => setPitch({...pitch, future: e.target.value})} />
              </div>
            </div>
          );
        }

        function PitchBlock({ title, color, value, template, onChange }) {
          const colorMap = { blue: 'border-blue-200 bg-blue-50 text-blue-800 focus:ring-blue-500', emerald: 'border-emerald-200 bg-emerald-50 text-emerald-800 focus:ring-emerald-500', purple: 'border-purple-200 bg-purple-50 text-purple-800 focus:ring-purple-500' };
          const [revealed, setRevealed] = useState(false);
          return (
            <div className="flex-1 flex flex-col">
              <label className="font-bold text-slate-700 mb-2">{title}</label>
              {!revealed ? (
                <button onClick={() => { setRevealed(true); onChange({target: {value: template}}); }} className="w-full h-32 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-lg hover:bg-slate-50 hover:border-indigo-300 group bg-white cursor-pointer transition-colors"><HelpCircle className="w-8 h-8 mb-2 text-slate-400 group-hover:text-indigo-400 transition-colors" /><span className="font-semibold text-slate-500 group-hover:text-indigo-500 transition-colors">Click to Reveal</span></button>
              ) : <textarea value={value} onChange={onChange} className={`w-full h-32 p-4 border rounded-lg outline-none focus:ring-2 resize-none ${colorMap[color]}`} />}
            </div>
          );
        }

        function StrengthsWeaknesses({ showNotes }) {
          const [selectedStrengths, setSelectedStrengths] = useState([]);
          const [revealWeakness, setRevealWeakness] = useState(false);
          const [weakness, setWeakness] = useState("");
          const [action, setAction] = useState("");

          const strengthOptions = ["Detail-oriented in documentation", "Adaptable to new lab protocols", "Strong analytical skills", "Good team player in the lab", "Patient during long experiments", "Strict with safety regulations"];

          const toggleStrength = (s) => {
            if (selectedStrengths.includes(s)) setSelectedStrengths(selectedStrengths.filter(item => item !== s));
            else if (selectedStrengths.length < 3) setSelectedStrengths([...selectedStrengths, s]);
          };

          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
              <div className="mb-8 border-b border-slate-100 pb-6">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2"><Star className="w-6 h-6 text-amber-500" /> "What are your strengths and weaknesses?"</h2>
                {showNotes && <p className="text-sm md:text-base text-slate-700 mt-3 bg-yellow-50 p-4 rounded-lg border border-yellow-200"><strong>Teacher's Note:</strong> Pick 3 strengths. For the weakness, teach the <em>"Sandwich Method"</em>.</p>}
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                <div>
                  <h3 className="font-bold text-lg text-emerald-700 mb-4 flex items-center gap-2"><Check className="w-5 h-5"/> Select up to 3 Strengths</h3>
                  <div className="flex flex-col gap-3">
                    {strengthOptions.map(s => (
                      <button key={s} onClick={() => toggleStrength(s)} className={`p-3 text-sm md:text-base text-left border rounded-lg transition-all ${selectedStrengths.includes(s) ? 'bg-emerald-100 border-emerald-500 text-emerald-900 font-bold shadow-sm' : 'bg-white border-slate-200 hover:border-emerald-300 text-slate-600'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="font-bold text-lg text-rose-700 mb-4 flex items-center gap-2"><AlertCircle className="w-5 h-5"/> The Weakness "Sandwich"</h3>
                  {!revealWeakness ? (
                    <button onClick={() => { setRevealWeakness(true); setWeakness("I sometimes focus too much on small details"); setAction("I now set timers for myself to ensure I finish lab reports on schedule"); }} className="w-full h-40 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-lg hover:bg-slate-50 hover:border-rose-300 group bg-white cursor-pointer transition-colors"><HelpCircle className="w-8 h-8 mb-2 text-slate-400 group-hover:text-rose-400 transition-colors" /><span className="font-semibold text-slate-500 group-hover:text-rose-500 transition-colors">Reveal Example</span></button>
                  ) : (
                    <div className="animate-in fade-in zoom-in-95 duration-200 bg-rose-50 border border-rose-200 rounded-lg p-4 md:p-5">
                      <label className="block text-sm font-bold text-rose-800 mb-1">My Weakness is...</label>
                      <input type="text" value={weakness} onChange={e => setWeakness(e.target.value)} className="w-full text-sm md:text-base p-2 mb-4 border border-rose-300 rounded outline-none focus:ring-2 focus:ring-rose-500 bg-white" />
                      <label className="block text-sm font-bold text-emerald-800 mb-1">HOWEVER, to improve this...</label>
                      <input type="text" value={action} onChange={e => setAction(e.target.value)} className="w-full text-sm md:text-base p-2 border border-emerald-300 rounded outline-none focus:ring-2 focus:ring-emerald-500 bg-white" />
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        function SurvivalEnglish({ showNotes }) {
          const phrases = [
            { type: 'clarify', text: "I'm sorry, could you repeat that please?", tip: "When you didn't hear them clearly over the phone." },
            { type: 'time', text: "That is a great question. Let me think for a second...", tip: "When you need to buy 3-5 seconds to organize your thoughts." },
            { type: 'honest', text: "I don't have direct experience with that specific machine, but...", tip: "How to pivot when you don't know the exact answer." }
          ];
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
              <div className="mb-8 border-b border-slate-100 pb-6">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2"><Shield className="w-6 h-6 text-sky-500" /> Survival English</h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {phrases.map((phrase, idx) => (
                  <div key={idx} className="p-4 md:p-5 border border-sky-200 bg-sky-50 rounded-lg shadow-sm">
                    <p className="font-bold text-base md:text-lg text-sky-900 mb-3">"{phrase.text}"</p>
                    <p className="text-sm text-sky-700 flex items-start gap-1"><span className="font-bold shrink-0">Use when:</span> <span>{phrase.tip}</span></p>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function GeneralQuestions() {
          const questions = [
            { q: "Where do you see yourself in 5 years?", t: "I hope to have grown into a senior lab technician role, leading my own independent research projects." },
            { q: "Why should we hire you?", t: "Because I bring a strong mix of academic background in polymer chemistry and practical experience with analytical tools like GC and FTIR." },
            { q: "Tell me about a time you faced a challenge at work.", t: "Once, a machine calibration failed right before a deadline. I documented the error, informed my supervisor, and switched to a manual testing method." },
          ];
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in zoom-in-95 duration-200">
              <div className="mb-8 border-b border-slate-100 pb-6">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2"><HelpCircle className="w-6 h-6 text-pink-500" /> General HR Questions</h2>
              </div>
              <div className="space-y-4">
                {questions.map((item, idx) => <QuestionFlipCard key={idx} question={item.q} template={item.t} number={idx + 1} colorTheme="pink" />)}
              </div>
            </div>
          );
        }

        // ==========================================
        // SHARED COMPONENTS
        // ==========================================
        function QuestionFlipCard({ question, template, number, colorTheme = "pink" }) {
          const [revealed, setRevealed] = useState(false);

          const colors = {
            pink: { border: 'border-pink-300', bgOpen: 'bg-pink-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-pink-200', badgeText: 'text-pink-800', icon: 'text-pink-500', innerBg: 'bg-pink-50/50', innerBorder: 'border-pink-100' },
            teal: { border: 'border-teal-300', bgOpen: 'bg-teal-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-teal-200', badgeText: 'text-teal-800', icon: 'text-teal-500', innerBg: 'bg-teal-50/50', innerBorder: 'border-teal-100' },
            cyan: { border: 'border-cyan-300', bgOpen: 'bg-cyan-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-cyan-200', badgeText: 'text-cyan-800', icon: 'text-cyan-500', innerBg: 'bg-cyan-50/50', innerBorder: 'border-cyan-100' },
            orange: { border: 'border-orange-300', bgOpen: 'bg-orange-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-orange-200', badgeText: 'text-orange-800', icon: 'text-orange-500', innerBg: 'bg-orange-50/50', innerBorder: 'border-orange-100' },
            violet: { border: 'border-violet-300', bgOpen: 'bg-violet-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-violet-200', badgeText: 'text-violet-800', icon: 'text-violet-500', innerBg: 'bg-violet-50/50', innerBorder: 'border-violet-100' },
            emerald: { border: 'border-emerald-300', bgOpen: 'bg-emerald-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-emerald-200', badgeText: 'text-emerald-800', icon: 'text-emerald-500', innerBg: 'bg-emerald-50/50', innerBorder: 'border-emerald-100' },
            blue: { border: 'border-blue-300', bgOpen: 'bg-blue-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-blue-200', badgeText: 'text-blue-800', icon: 'text-blue-500', innerBg: 'bg-blue-50/50', innerBorder: 'border-blue-100' },
            stone: { border: 'border-stone-300', bgOpen: 'bg-stone-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-stone-200', badgeText: 'text-stone-800', icon: 'text-stone-500', innerBg: 'bg-stone-50/50', innerBorder: 'border-stone-100' },
            green: { border: 'border-green-300', bgOpen: 'bg-green-50', bgClosedHover: 'hover:bg-slate-50', badgeBg: 'bg-green-200', badgeText: 'text-green-800', icon: 'text-green-500', innerBg: 'bg-green-50/50', innerBorder: 'border-green-100' },
          };
          const theme = colors[colorTheme];

          return (
            <div className={`border rounded-lg overflow-hidden transition-all duration-200 shadow-sm ${revealed ? theme.border : 'border-slate-200'}`}>
              <button onClick={() => setRevealed(!revealed)} className={`w-full p-4 flex justify-between items-start md:items-center text-left outline-none focus:ring-2 focus:ring-slate-300 transition-colors ${revealed ? theme.bgOpen : `bg-white ${theme.bgClosedHover}`}`}>
                <span className="font-bold text-sm md:text-base text-slate-800 flex items-start gap-3 md:gap-4">
                  <span className={`flex items-center justify-center w-7 h-7 md:w-8 md:h-8 rounded-full text-xs md:text-sm shrink-0 transition-colors ${revealed ? `${theme.badgeBg} ${theme.badgeText}` : 'bg-slate-100 text-slate-600'}`}>{number}</span>
                  <span className="pt-0.5 md:pt-0">{question}</span>
                </span>
                {revealed ? <ChevronUp className={`w-5 h-5 ${theme.icon} shrink-0 mt-1 md:mt-0`}/> : <ChevronDown className="w-5 h-5 text-slate-400 shrink-0 mt-1 md:mt-0"/>}
              </button>
              {revealed && (
                <div className={`p-4 md:p-5 ${theme.innerBg} border-t ${theme.innerBorder} text-slate-900 animate-in slide-in-from-top-2 fade-in duration-200`}>
                  <span className={`text-xs font-bold uppercase tracking-wider ${theme.icon} mb-2 flex items-center gap-1`}><MessageSquare className="w-4 h-4"/> Suggested Technical Answer:</span>
                  <p className={`italic text-base md:text-lg text-slate-700 ml-2 md:ml-5 pl-3 md:pl-4 border-l-2 ${theme.border}`}>"{template}"</p>
                </div>
              )}
            </div>
          );
        }

        // Initialize React App on the root element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
